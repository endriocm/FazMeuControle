<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#3B2417">
  <meta name="description" content="Controle financeiro pessoal com lançamentos, cartões e análises.">
  <title>Fluxo | Controle financeiro</title>
  <style>
    :root{--espresso:#3b2417;--coffee:#5a3825;--cocoa:#704323;--caramel:#b98252;--gold:#c99a5b;--cream:#f6efe7;--card:#fff8ef;--green:#3f7d58;--green-soft:#dcefe3;--red:#a94a3a;--yellow:#f4d89d;--ink:#2b1b12;--muted:#8a735f;--line:#ead8c5;--shadow:0 14px 35px rgba(59,36,23,.1);--soft-shadow:0 10px 24px rgba(59,36,23,.08);--radius:18px}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 0%,rgba(201,154,91,.18),transparent 34%),radial-gradient(circle at 94% 20%,rgba(185,130,82,.14),transparent 32%),linear-gradient(180deg,#fbf5ec 0%,var(--cream) 42%,#f4eadf 100%)}
    button,input,select,textarea{font:inherit}button{border:0;cursor:pointer}.app-shell{max-width:1440px;margin:auto;padding:0 18px 42px}.topbar{position:sticky;z-index:20;top:0;margin:0 -18px 16px;padding:14px 18px;background:linear-gradient(135deg,var(--espresso),var(--coffee) 58%,var(--caramel) 128%);box-shadow:0 10px 26px rgba(59,36,23,.18);color:var(--cream)}.topbar-inner{max-width:1440px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:14px}.brand{display:flex;align-items:center;gap:10px}.brand-mark{width:36px;height:36px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--caramel));font-weight:900;color:white;box-shadow:inset 0 1px rgba(255,255,255,.35)}.brand h1{font-size:1.12rem;letter-spacing:-.04em;margin:0}.brand p{margin:3px 0 0;font-size:.75rem;color:#ead8c5}.toolbar{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.field-mini{display:flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid rgba(255,248,239,.18);border-radius:999px;background:rgba(255,248,239,.11)}.field-mini label{font-size:.7rem;color:#ead8c5}.field-mini select{height:28px;min-width:100px;border:0;border-radius:999px;padding:0 8px;background:var(--card);color:var(--espresso);font-weight:700;outline:0}.btn{height:34px;padding:0 12px;display:inline-flex;align-items:center;gap:6px;border-radius:999px;background:var(--card);color:var(--espresso);font-size:.77rem;font-weight:800;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.08);transition:.18s}.btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(0,0,0,.13)}.btn.primary{color:#fff;background:linear-gradient(135deg,var(--gold),var(--caramel))}.btn.ghost{color:#fff;background:rgba(255,248,239,.13);border:1px solid rgba(255,248,239,.25);box-shadow:none}.btn.dark{color:#fff;background:var(--espresso)}.btn.green{color:#fff;background:var(--green)}.btn.red{color:#fff;background:var(--red)}.btn.soft{background:#f3e3d1;color:var(--coffee);box-shadow:none}.btn.small{height:29px;padding:0 9px;font-size:.69rem}.summary-grid{display:grid;grid-template-columns:repeat(6,minmax(136px,1fr));gap:10px;margin:16px 0 12px}.kpi-card{position:relative;overflow:hidden;min-height:99px;padding:13px 12px;background:rgba(255,248,239,.86);border:1px solid rgba(112,67,35,.12);border-radius:16px;box-shadow:var(--soft-shadow)}.kpi-card:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:linear-gradient(90deg,var(--gold),rgba(185,130,82,.28))}.kpi-label{font-size:.66rem;text-transform:uppercase;letter-spacing:.055em;color:var(--muted);font-weight:800}.kpi-value{margin-top:9px;font-size:1rem;font-weight:900;letter-spacing:-.04em;white-space:nowrap}.kpi-hint{margin-top:6px;font-size:.68rem;color:#9b826e}.positive{color:var(--green)}.negative{color:var(--red)}.warning{color:#916210}.neutral{color:var(--coffee)}.tabs{display:flex;gap:8px;overflow:auto;padding:4px 2px 12px;margin:0 0 6px;scrollbar-width:thin}.tab-btn{flex:0 0 auto;padding:10px 14px;border:1px solid rgba(112,67,35,.12);border-radius:999px;background:rgba(255,248,239,.72);color:var(--coffee);font-size:.82rem;font-weight:800;transition:.18s}.tab-btn.active{color:#fff;background:linear-gradient(135deg,var(--espresso),var(--cocoa));box-shadow:0 10px 22px rgba(59,36,23,.16)}.page{animation:fade .2s ease}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}.section-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px;align-items:start}.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.panel{overflow:hidden;background:rgba(255,248,239,.84);border:1px solid rgba(112,67,35,.12);border-radius:var(--radius);box-shadow:var(--shadow)}.panel-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.36),rgba(255,248,239,.38))}.panel-title{margin:0;font-size:.94rem;letter-spacing:-.02em;color:var(--espresso)}.panel-subtitle{margin:3px 0 0;font-size:.72rem;color:var(--muted)}.panel-body{padding:14px}.stack{display:grid;gap:9px}.item-card{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px;border:1px solid rgba(112,67,35,.13);border-radius:14px;background:#fffdf9}.item-main{display:flex;align-items:center;min-width:0;gap:10px}.icon-round{width:34px;height:34px;flex:0 0 34px;display:grid;place-items:center;border-radius:11px;background:#f3e3d1;color:var(--coffee);font-weight:900}.item-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.83rem;font-weight:850}.item-meta{margin-top:3px;color:var(--muted);font-size:.7rem}.item-value{text-align:right;font-size:.83rem;font-weight:900;white-space:nowrap}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:.65rem;font-weight:850}.pill.green{background:var(--green-soft);color:#25603c}.pill.yellow{background:#fff0c9;color:#8f6316}.pill.red{background:#f8dcd7;color:#963e31}.empty{padding:28px 14px;text-align:center;color:var(--muted);font-size:.8rem}.alert{padding:11px 12px;border:1px solid #edc8bf;border-radius:13px;background:#fff3ee;color:#8c4136;font-size:.76rem;line-height:1.45}.balance-hero{position:relative;overflow:hidden;padding:18px;border:1px solid rgba(112,67,35,.12);border-radius:var(--radius);color:white;background:linear-gradient(135deg,var(--espresso),var(--coffee) 60%,var(--cocoa));box-shadow:var(--shadow)}.balance-hero:after{content:"";position:absolute;width:190px;height:190px;right:-70px;top:-90px;border:35px solid rgba(201,154,91,.17);border-radius:50%}.balance-label{position:relative;z-index:1;color:#ead8c5;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em}.balance-value{position:relative;z-index:1;margin:8px 0 3px;font-size:1.9rem;font-weight:900;letter-spacing:-.06em}.balance-copy{position:relative;z-index:1;margin:0;color:#ead8c5;font-size:.76rem}.trend{display:flex;align-items:end;gap:7px;height:144px;margin-top:15px;padding:0 2px}.trend-col{flex:1;min-width:0;display:flex;align-items:center;flex-direction:column;justify-content:end;gap:5px}.trend-bar{width:100%;max-width:35px;min-height:8px;border-radius:6px 6px 2px 2px;background:linear-gradient(180deg,var(--gold),var(--caramel));transition:.25s}.trend-col span{font-size:.61rem;color:var(--muted)}.category-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;align-items:center;margin:12px 0}.category-row:first-child{margin-top:0}.category-head{display:flex;justify-content:space-between;gap:8px;font-size:.76rem;font-weight:750}.bar-track{grid-column:1/-1;height:8px;overflow:hidden;border-radius:999px;background:#ead8c5}.bar-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--gold),var(--caramel))}.card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.credit-card{position:relative;overflow:hidden;min-height:154px;padding:15px;border-radius:18px;color:#fff;background:linear-gradient(135deg,var(--espresso),var(--cocoa));box-shadow:0 10px 22px rgba(59,36,23,.18)}.credit-card:nth-child(2n){background:linear-gradient(135deg,#435f61,#264243)}.credit-card:after{content:"";position:absolute;width:160px;height:160px;right:-72px;bottom:-92px;border:24px solid rgba(255,255,255,.1);border-radius:50%}.credit-top,.credit-bottom{position:relative;z-index:1;display:flex;justify-content:space-between;gap:10px}.credit-name{font-size:.85rem;font-weight:850}.credit-limit{color:#f0ddc7;font-size:.7rem}.credit-number{position:relative;z-index:1;margin:30px 0 12px;letter-spacing:.14em;font-size:.75rem;color:#f7eadb}.credit-bottom{font-size:.69rem;color:#f0ddc7}.usage{position:relative;z-index:1;margin-top:7px;height:6px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.18)}.usage i{display:block;height:100%;border-radius:inherit;background:var(--gold)}.table-wrap{overflow:auto}.data-table{width:100%;border-collapse:collapse;font-size:.78rem}.data-table th{padding:11px;text-align:left;color:var(--muted);font-size:.65rem;text-transform:uppercase;letter-spacing:.045em;background:#f8ede1;white-space:nowrap}.data-table td{padding:12px 11px;border-top:1px solid var(--line);white-space:nowrap}.data-table td:first-child{font-weight:800;color:var(--espresso)}.actions{display:flex;justify-content:flex-end;gap:5px}.icon-btn{width:29px;height:29px;display:grid;place-items:center;border:1px solid var(--line);border-radius:9px;background:#fffaf4;color:var(--coffee);font-size:.8rem}.icon-btn.danger{color:var(--red)}.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}.filter-bar input,.filter-bar select,.field input,.field select,.field textarea{height:36px;padding:0 10px;outline:0;border:1px solid var(--line);border-radius:10px;background:#fffdf9;color:var(--ink);font-size:.78rem}.filter-bar input{min-width:190px;flex:1}.field textarea{height:82px;padding:10px;resize:vertical}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.field{display:grid;gap:6px}.field.full{grid-column:1/-1}.field label{color:var(--coffee);font-size:.7rem;font-weight:850}.field small{color:var(--muted);font-size:.66rem}.category-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}.category-card{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;border:1px solid rgba(112,67,35,.13);border-radius:15px;background:#fffdf9}.cat-left{display:flex;align-items:center;gap:9px}.cat-dot{width:13px;height:13px;border-radius:50%;box-shadow:0 0 0 4px rgba(112,67,35,.08)}.cat-name{font-size:.79rem;font-weight:850}.cat-kind{margin-top:2px;color:var(--muted);font-size:.68rem}.settings-list{display:grid;gap:12px}.setting{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px;border:1px solid var(--line);border-radius:13px;background:#fffdf9}.setting strong{font-size:.79rem}.setting p{margin:3px 0 0;color:var(--muted);font-size:.7rem;line-height:1.4}.setting input{width:145px}.modal-shell{position:fixed;z-index:100;inset:0;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(43,27,18,.52);backdrop-filter:blur(3px)}.modal-shell.open{display:flex}.modal{width:min(620px,100%);max-height:calc(100vh - 32px);overflow:auto;border-radius:20px;background:var(--card);box-shadow:0 24px 70px rgba(30,15,8,.32)}.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 16px;border-bottom:1px solid var(--line)}.modal-head h2{margin:0;color:var(--espresso);font-size:1rem}.close-btn{width:30px;height:30px;border-radius:9px;background:#f2e1d0;color:var(--coffee);font-size:1.25rem}.modal-body{padding:16px}.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}.toast{position:fixed;z-index:120;bottom:18px;left:50%;transform:translate(-50%,20px);padding:10px 13px;border-radius:999px;background:var(--espresso);color:#fff8ef;font-size:.75rem;font-weight:750;opacity:0;pointer-events:none;transition:.22s;box-shadow:var(--soft-shadow)}.toast.show{opacity:1;transform:translate(-50%,0)}.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;background:currentColor}.helper{margin:0;color:var(--muted);font-size:.72rem;line-height:1.5}
    @media(max-width:1180px){.summary-grid{grid-template-columns:repeat(3,1fr)}.section-grid,.grid-2{grid-template-columns:1fr}}@media(max-width:720px){.app-shell{padding:0 12px 30px}.topbar{margin:0 -12px 12px}.topbar-inner{align-items:flex-start;flex-direction:column}.toolbar{justify-content:flex-start}.summary-grid{grid-template-columns:repeat(2,1fr)}.kpi-value{font-size:.88rem}.card-grid{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.hide-mobile{display:none}.filter-bar input{min-width:100%}.data-table{font-size:.72rem}}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand"><div class="brand-mark">F</div><div><h1>Fluxo Financeiro</h1><p>Planeje, acompanhe e decida com clareza.</p></div></div><div class="toolbar"><div class="field-mini"><label for="monthSelect">Período</label><select id="monthSelect" aria-label="Período"></select></div><button class="btn ghost" data-action="export">⇩ Backup</button><button class="btn ghost" data-action="import">⇧ Importar</button><button class="btn primary" data-action="open-transaction" data-kind="expense">＋ Lançamento</button><input id="importFile" type="file" accept="application/json" hidden></div></div></header>
  <main class="app-shell"><section class="summary-grid" id="summaryCards" aria-label="Resumo financeiro"></section><nav class="tabs" id="tabs" aria-label="Seções"></nav><div id="app"></div></main>
  <div class="modal-shell" id="modalShell" aria-hidden="true"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal-head"><h2 id="modalTitle">Novo lançamento</h2><button class="close-btn" data-action="close-modal" aria-label="Fechar">×</button></div><div class="modal-body" id="modalBody"></div></div></div><div id="toast" class="toast" role="status"></div>
  <script>
  (() => {
    'use strict';
    const KEY = 'fluxo-financeiro.vercel.v1';
    const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const tabs = [['dashboard','Visão geral'],['entries','Entradas'],['expenses','Saídas'],['cards','Cartões'],['analysis','Análises'],['categories','Categorias'],['settings','Configurações']];
    const today = new Date();
    const currentKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
    const sample = {settings:{initialBalance:4800,month:currentKey},categories:[
      {id:'salario',name:'Salário',type:'entry',color:'#3f7d58'},{id:'freelas',name:'Freelances',type:'entry',color:'#6fa77d'},
      {id:'moradia',name:'Moradia',type:'expense',color:'#704323'},{id:'alimentacao',name:'Alimentação',type:'expense',color:'#b98252'},
      {id:'transporte',name:'Transporte',type:'expense',color:'#c99a5b'},{id:'lazer',name:'Lazer',type:'expense',color:'#a94a3a'},
      {id:'saude',name:'Saúde',type:'expense',color:'#8c6544'},{id:'cartao',name:'Cartão de crédito',type:'expense',color:'#5a3825'}
    ],transactions:[
      {id:'t1',type:'entry',description:'Salário',category:'salario',value:8500,date:`${currentKey}-05`,status:'received',method:'Transferência',recurring:true},
      {id:'t2',type:'entry',description:'Projeto adicional',category:'freelas',value:1450,date:`${currentKey}-15`,status:'pending',method:'PIX',recurring:false},
      {id:'t3',type:'expense',description:'Aluguel',category:'moradia',value:2200,date:`${currentKey}-08`,status:'paid',method:'Transferência',recurring:true},
      {id:'t4',type:'expense',description:'Mercado do mês',category:'alimentacao',value:860,date:`${currentKey}-10`,status:'paid',method:'Cartão',recurring:false},
      {id:'t5',type:'expense',description:'Plano de saúde',category:'saude',value:580,date:`${currentKey}-14`,status:'pending',method:'Débito',recurring:true},
      {id:'t6',type:'expense',description:'Assinaturas',category:'lazer',value:109.9,date:`${currentKey}-20`,status:'pending',method:'Cartão',recurring:true}
    ],cards:[
      {id:'c1',name:'Nubank',limit:6000,dueDay:12,color:'#704323'},{id:'c2',name:'Visa Platinum',limit:12000,dueDay:22,color:'#435f61'}
    ],purchases:[
      {id:'p1',cardId:'c1',description:'Mercado do mês',value:860,date:`${currentKey}-10`,installments:1},
      {id:'p2',cardId:'c1',description:'Curso online',value:249.9,date:`${currentKey}-12`,installments:1},
      {id:'p3',cardId:'c2',description:'Passagens',value:1840,date:`${currentKey}-17`,installments:4}
    ]};
    let data = load(); let state = {tab:'dashboard',filter:'',type:'all'};
    const $ = (s, el=document) => el.querySelector(s); const esc = (v='') => String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    function load(){try{const v=JSON.parse(localStorage.getItem(KEY));return v&&v.transactions&&v.categories?v:structuredClone(sample)}catch{return structuredClone(sample)}}
    function save(){localStorage.setItem(KEY,JSON.stringify(data));}
    function money(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v)||0)}
    function selectedMonth(){return data.settings.month||currentKey}
    function monthLabel(key=selectedMonth()){const [year,m]=key.split('-');return `${months[Number(m)-1]} de ${year}`}
    function category(id){return data.categories.find(c=>c.id===id)||{name:'Sem categoria',color:'#8a735f'}}
    function txMonth(t){return String(t.date||'').slice(0,7)}
    function isInMonth(t,key=selectedMonth()){return txMonth(t)===key || (t.recurring && txMonth(t)<=key)}
    function transactions(type){return data.transactions.filter(t=>isInMonth(t)&&(!type||t.type===type))}
    function totals(){const all=transactions();const entries=all.filter(t=>t.type==='entry');const expenses=all.filter(t=>t.type==='expense');const sum=a=>a.reduce((n,t)=>n+Number(t.value||0),0);const received=sum(entries.filter(t=>t.status==='received'));const paid=sum(expenses.filter(t=>t.status==='paid'));const plannedEntries=sum(entries);const plannedExpenses=sum(expenses);const base=Number(data.settings.initialBalance||0);return {base,plannedEntries,plannedExpenses,received,paid,pendingIn:plannedEntries-received,pendingOut:plannedExpenses-paid,balance:base+received-paid,forecast:base+plannedEntries-plannedExpenses}}
    function toast(message){const el=$('#toast');el.textContent=message;el.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>el.classList.remove('show'),2600)}
    function status(t){if(t.status==='paid'||t.status==='received')return '<span class="pill green">● Realizado</span>';return '<span class="pill yellow">● Pendente</span>'}
    function render(){renderHeader();renderSummary();renderTabs();const app=$('#app');const pages={dashboard:dashboard,entries:()=>listPage('entry'),expenses:()=>listPage('expense'),cards:cards,analysis:analysis,categories:categories,settings:settings};app.innerHTML=pages[state.tab]();}
    function renderHeader(){const select=$('#monthSelect');const base=selectedMonth().slice(0,4);let options='';for(let year=Number(base)-1;year<=Number(base)+1;year++){months.forEach((m,i)=>{const key=`${year}-${String(i+1).padStart(2,'0')}`;options+=`<option value="${key}" ${key===selectedMonth()?'selected':''}>${m.slice(0,3)} ${year}</option>`})}select.innerHTML=options}
    function renderSummary(){const t=totals();const items=[['Saldo disponível',t.balance,t.balance>=0?'positive':'negative','realizado até agora'],['Entradas previstas',t.plannedEntries,'positive','recebidas e a receber'],['Saídas previstas',t.plannedExpenses,'negative','pagas e a pagar'],['A receber',t.pendingIn,'warning','lançamentos pendentes'],['A pagar',t.pendingOut,'warning','compromissos abertos'],['Saldo projetado',t.forecast,t.forecast>=0?'positive':'negative','fim do período']];$('#summaryCards').innerHTML=items.map(([label,value,tone,hint])=>`<article class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value ${tone}">${money(value)}</div><div class="kpi-hint">${hint}</div></article>`).join('')}
    function renderTabs(){$('#tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab-btn ${id===state.tab?'active':''}" data-action="tab" data-tab="${id}">${label}</button>`).join('')}
    function upcoming(type){return transactions(type).filter(t=>t.status==='pending').sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5)}
    function listItems(items,empty='Nenhum lançamento para este período.'){if(!items.length)return `<div class="empty">${empty}</div>`;return `<div class="stack">${items.map(t=>`<article class="item-card"><div class="item-main"><div class="icon-round" style="background:${category(t.category).color}22;color:${category(t.category).color}">${t.type==='entry'?'↗':'↘'}</div><div><div class="item-title">${esc(t.description)}</div><div class="item-meta">${esc(category(t.category).name)} · ${dateText(t.date)}</div></div></div><div><div class="item-value ${t.type==='entry'?'positive':'negative'}">${t.type==='entry'?'+':'−'} ${money(t.value)}</div><div class="item-meta" style="text-align:right">${t.status==='pending'?'Pendente':'Realizado'}</div></div></article>`).join('')}</div>`}
    function dateText(value){if(!value)return 'Sem data';const [y,m,d]=value.split('-');return `${d}/${m}/${y}`}
    function dashboard(){const t=totals();const expenseCategories=aggregate('expense').slice(0,5);const max=Math.max(...expenseCategories.map(x=>x.value),1);const balanceClass=t.balance>=0?'positive':'negative';return `<section class="page"><div class="section-grid"><div class="stack"><article class="balance-hero"><div class="balance-label">Saldo realizado em ${monthLabel()}</div><div class="balance-value">${money(t.balance)}</div><p class="balance-copy">Você projetou ${money(t.forecast)} para o fim do período.</p></article><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Fluxo dos últimos 6 meses</h2><p class="panel-subtitle">Evolução estimada do seu saldo</p></div></div><div class="panel-body"><div class="trend">${trendBars()}</div></div></article><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Próximas saídas</h2><p class="panel-subtitle">Organizadas pela data de vencimento</p></div><button class="btn soft small" data-action="tab" data-tab="expenses">Ver todas</button></div><div class="panel-body">${listItems(upcoming('expense'),'Nenhuma saída pendente.')}</div></article></div><div class="stack"><article class="panel"><div class="panel-header"><div><h2 class="panel-title">A receber</h2><p class="panel-subtitle">Entradas ainda não confirmadas</p></div><button class="btn soft small" data-action="tab" data-tab="entries">Ver todas</button></div><div class="panel-body">${listItems(upcoming('entry'),'Nenhuma entrada pendente.')}</div></article><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Saídas por categoria</h2><p class="panel-subtitle">Onde está o peso do mês</p></div></div><div class="panel-body">${expenseCategories.length?expenseCategories.map(x=>`<div class="category-row"><div class="category-head"><span>${esc(x.name)}</span><strong>${money(x.value)}</strong></div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(5,x.value/max*100)}%;background:linear-gradient(90deg,${x.color},var(--caramel))"></div></div></div>`).join(''):'<div class="empty">Sem saídas neste período.</div>'}</div></article><article class="alert"><strong>Leitura do período:</strong> ${t.forecast>=0?'o planejamento fecha positivo.':'as despesas projetadas superam as entradas.'} Revise lançamentos pendentes antes do fechamento.</article></div></div></section>`}
    function trendBars(){const selected=new Date(`${selectedMonth()}-01T12:00:00`);const vals=[];for(let i=5;i>=0;i--){const d=new Date(selected.getFullYear(),selected.getMonth()-i,1);const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const set=data.transactions.filter(t=>txMonth(t)===key);const v=Number(data.settings.initialBalance||0)+set.filter(t=>t.type==='entry').reduce((s,t)=>s+Number(t.value),0)-set.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.value),0);vals.push({name:months[d.getMonth()].slice(0,3),value:Math.max(0,v)})}const max=Math.max(...vals.map(x=>x.value),1);return vals.map(x=>`<div class="trend-col"><div class="trend-bar" title="${money(x.value)}" style="height:${Math.max(10,x.value/max*120)}px"></div><span>${x.name}</span></div>`).join('')}
    function listPage(type){const label=type==='entry'?'Entradas':'Saídas';const records=transactions(type).filter(t=>`${t.description} ${category(t.category).name}`.toLowerCase().includes(state.filter.toLowerCase())).sort((a,b)=>a.date.localeCompare(b.date));return `<section class="page"><article class="panel"><div class="panel-header"><div><h2 class="panel-title">${label} de ${monthLabel()}</h2><p class="panel-subtitle">Controle seus lançamentos e marque o que já foi realizado.</p></div><button class="btn ${type==='entry'?'green':'primary'}" data-action="open-transaction" data-kind="${type}">＋ Nova ${type==='entry'?'entrada':'saída'}</button></div><div class="panel-body"><div class="filter-bar"><input data-filter="records" value="${esc(state.filter)}" placeholder="Buscar por descrição ou categoria"><select data-filter-status><option value="all">Todos os status</option><option value="pending">Pendentes</option><option value="done">Realizados</option></select></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Descrição</th><th class="hide-mobile">Categoria</th><th>Data</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody>${records.length?records.map(t=>`<tr><td>${esc(t.description)}${t.recurring?' <span class="pill yellow">recorrente</span>':''}</td><td class="hide-mobile">${esc(category(t.category).name)}</td><td>${dateText(t.date)}</td><td class="${type==='entry'?'positive':'negative'}">${type==='entry'?'+':'−'} ${money(t.value)}</td><td>${status(t)}</td><td><div class="actions"><button class="icon-btn" title="Editar" data-action="edit-transaction" data-id="${t.id}">✎</button><button class="icon-btn" title="Marcar" data-action="toggle-status" data-id="${t.id}">✓</button><button class="icon-btn danger" title="Excluir" data-action="delete-transaction" data-id="${t.id}">×</button></div></td></tr>`).join(''):'<tr><td colspan="6"><div class="empty">Nenhum lançamento encontrado.</div></td></tr>'}</tbody></table></div></div></article></section>`}
    function cardSpend(cardId){return data.purchases.filter(p=>p.cardId===cardId&&isInMonth(p)).reduce((s,p)=>s+Number(p.value),0)}
    function cards(){return `<section class="page"><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Cartões de crédito</h2><p class="panel-subtitle">Limite utilizado e compras do período.</p></div><button class="btn primary" data-action="open-card">＋ Novo cartão</button></div><div class="panel-body"><div class="card-grid">${data.cards.map(c=>{const spent=cardSpend(c.id),percent=Math.min(100,spent/Number(c.limit)*100);return `<article class="credit-card" style="background:linear-gradient(135deg,${c.color},var(--cocoa))"><div class="credit-top"><span class="credit-name">${esc(c.name)}</span><span class="credit-limit">Limite ${money(c.limit)}</span></div><div class="credit-number">•••• &nbsp;•••• &nbsp;•••• &nbsp;${c.id.slice(-4).padStart(4,'0')}</div><div class="credit-bottom"><span>Fatura atual: <strong>${money(spent)}</strong></span><span>Vence dia ${c.dueDay}</span></div><div class="usage"><i style="width:${percent}%"></i></div></article>`}).join('')}</div><div style="height:14px"></div><div class="panel-header" style="padding:0 0 11px;background:none"><div><h2 class="panel-title">Compras no cartão</h2><p class="panel-subtitle">Lançamentos que compõem as faturas.</p></div><button class="btn soft small" data-action="open-purchase">＋ Compra</button></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Compra</th><th>Cartão</th><th>Data</th><th>Valor</th><th></th></tr></thead><tbody>${data.purchases.filter(isInMonth).sort((a,b)=>a.date.localeCompare(b.date)).map(p=>`<tr><td>${esc(p.description)}${p.installments>1?' <span class="pill yellow">${p.installments}x</span>':''}</td><td>${esc((data.cards.find(c=>c.id===p.cardId)||{}).name||'—')}</td><td>${dateText(p.date)}</td><td class="negative">− ${money(p.value)}</td><td><div class="actions"><button class="icon-btn danger" data-action="delete-purchase" data-id="${p.id}">×</button></div></td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">Nenhuma compra neste período.</div></td></tr>'}</tbody></table></div></div></article></section>`}
    function aggregate(type){const map={};transactions(type).forEach(t=>{const c=category(t.category);if(!map[c.name])map[c.name]={name:c.name,color:c.color,value:0};map[c.name].value+=Number(t.value)});return Object.values(map).sort((a,b)=>b.value-a.value)}
    function analysis(){const inc=aggregate('entry'),out=aggregate('expense'),max=Math.max(...inc.concat(out).map(x=>x.value),1);return `<section class="page"><div class="grid-2"><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Entradas por origem</h2><p class="panel-subtitle">Composição das receitas previstas</p></div></div><div class="panel-body">${bars(inc,max,'#3f7d58')}</div></article><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Saídas por categoria</h2><p class="panel-subtitle">Composição das despesas previstas</p></div></div><div class="panel-body">${bars(out,max,'#b98252')}</div></article></div><div style="height:14px"></div><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Resumo de planejamento</h2><p class="panel-subtitle">Leitura objetiva para o período selecionado.</p></div></div><div class="panel-body"><div class="grid-2"><div><p class="helper">Taxa de comprometimento da renda</p><div class="kpi-value ${totals().plannedEntries? 'neutral':'warning'}">${totals().plannedEntries?Math.round(totals().plannedExpenses/totals().plannedEntries*100):0}%</div><p class="helper">das entradas previstas estão destinadas a saídas.</p></div><div><p class="helper">Reserva projetada</p><div class="kpi-value ${totals().forecast>=0?'positive':'negative'}">${money(totals().forecast)}</div><p class="helper">saldo estimado após todos os lançamentos do período.</p></div></div></div></article></section>`}
    function bars(items,max,fallback){return items.length?items.map(x=>`<div class="category-row"><div class="category-head"><span><i class="status-dot" style="color:${x.color||fallback}"></i>${esc(x.name)}</span><strong>${money(x.value)}</strong></div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(5,x.value/max*100)}%;background:linear-gradient(90deg,${x.color||fallback},var(--gold))"></div></div></div>`).join(''):'<div class="empty">Ainda não há dados para analisar.</div>'}
    function categories(){return `<section class="page"><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Categorias</h2><p class="panel-subtitle">Classificações usadas nos seus lançamentos.</p></div><button class="btn primary" data-action="open-category">＋ Categoria</button></div><div class="panel-body"><div class="category-list">${data.categories.map(c=>`<article class="category-card"><div class="cat-left"><span class="cat-dot" style="background:${c.color}"></span><div><div class="cat-name">${esc(c.name)}</div><div class="cat-kind">${c.type==='entry'?'Entrada':'Saída'}</div></div></div><button class="icon-btn danger" data-action="delete-category" data-id="${c.id}" title="Excluir">×</button></article>`).join('')}</div></div></article></section>`}
    function settings(){return `<section class="page"><div class="grid-2"><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Configurações financeiras</h2><p class="panel-subtitle">Ajustes usados nos seus cálculos.</p></div></div><div class="panel-body"><div class="settings-list"><div class="setting"><div><strong>Saldo inicial</strong><p>Base para o cálculo do saldo disponível e projetado.</p></div><input id="initialBalance" type="number" min="0" step="0.01" value="${data.settings.initialBalance}"></div><div class="setting"><div><strong>Armazenamento local</strong><p>Os dados ficam neste navegador. Faça backup com frequência.</p></div><span class="pill green">Ativo</span></div></div></div></article><article class="panel"><div class="panel-header"><div><h2 class="panel-title">Dados</h2><p class="panel-subtitle">Exporte, importe ou recomece o controle.</p></div></div><div class="panel-body"><div class="stack"><button class="btn dark" data-action="export">⇩ Exportar backup JSON</button><button class="btn soft" data-action="import">⇧ Importar backup JSON</button><button class="btn red" data-action="reset">Restaurar dados de exemplo</button><p class="helper">A restauração apaga os dados salvos neste navegador e volta ao conjunto de demonstração.</p></div></div></article></div></section>`}
    function openModal(title, body){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=body;$('#modalShell').classList.add('open');$('#modalShell').setAttribute('aria-hidden','false');setTimeout(()=>$('#modalBody input, #modalBody select')?.focus(),0)}
    function closeModal(){$('#modalShell').classList.remove('open');$('#modalShell').setAttribute('aria-hidden','true')}
    function categoryOptions(type,selected=''){return data.categories.filter(c=>c.type===type).map(c=>`<option value="${c.id}" ${c.id===selected?'selected':''}>${esc(c.name)}</option>`).join('')}
    function transactionForm(kind,tx={}){const title=tx.id?'Editar lançamento':kind==='entry'?'Nova entrada':'Nova saída';openModal(title,`<form id="transactionForm" data-id="${tx.id||''}" data-kind="${kind}"><div class="form-grid"><div class="field full"><label>Descrição</label><input required name="description" value="${esc(tx.description||'')}" placeholder="Ex.: Aluguel"></div><div class="field"><label>Valor</label><input required name="value" type="number" min="0.01" step="0.01" value="${tx.value||''}" placeholder="0,00"></div><div class="field"><label>Data</label><input required name="date" type="date" value="${tx.date||`${selectedMonth()}-01`}"></div><div class="field"><label>Categoria</label><select required name="category">${categoryOptions(kind,tx.category)}</select></div><div class="field"><label>Forma de pagamento</label><select name="method">${['PIX','Transferência','Débito','Boleto','Cartão','Dinheiro'].map(x=>`<option ${x===(tx.method||'PIX')?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Status</label><select name="status"><option value="pending" ${tx.status!=='paid'&&tx.status!=='received'?'selected':''}>Pendente</option><option value="${kind==='entry'?'received':'paid'}" ${tx.status==='paid'||tx.status==='received'?'selected':''}>Realizado</option></select></div><div class="field"><label>Recorrência</label><select name="recurring"><option value="false" ${!tx.recurring?'selected':''}>Única</option><option value="true" ${tx.recurring?'selected':''}>Mensal</option></select></div></div><div class="modal-foot"><button type="button" class="btn soft" data-action="close-modal">Cancelar</button><button class="btn ${kind==='entry'?'green':'primary'}" type="submit">Salvar lançamento</button></div></form>`)}
    function cardForm(){openModal('Novo cartão',`<form id="cardForm"><div class="form-grid"><div class="field full"><label>Nome do cartão</label><input required name="name" placeholder="Ex.: Mastercard Black"></div><div class="field"><label>Limite</label><input required name="limit" type="number" min="1" step="0.01" placeholder="0,00"></div><div class="field"><label>Dia de vencimento</label><input required name="dueDay" type="number" min="1" max="31" placeholder="10"></div><div class="field full"><label>Cor</label><input name="color" type="color" value="#704323"></div></div><div class="modal-foot"><button type="button" class="btn soft" data-action="close-modal">Cancelar</button><button class="btn primary">Salvar cartão</button></div></form>`)}
    function purchaseForm(){if(!data.cards.length){toast('Cadastre um cartão primeiro.');return}openModal('Nova compra',`<form id="purchaseForm"><div class="form-grid"><div class="field full"><label>Descrição</label><input required name="description" placeholder="Ex.: Restaurante"></div><div class="field"><label>Cartão</label><select name="cardId">${data.cards.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Valor total</label><input required name="value" type="number" min=".01" step=".01"></div><div class="field"><label>Data</label><input required name="date" type="date" value="${selectedMonth()}-01"></div><div class="field"><label>Parcelas</label><input required name="installments" type="number" min="1" value="1"></div></div><div class="modal-foot"><button type="button" class="btn soft" data-action="close-modal">Cancelar</button><button class="btn primary">Salvar compra</button></div></form>`)}
    function categoryForm(){openModal('Nova categoria',`<form id="categoryForm"><div class="form-grid"><div class="field full"><label>Nome</label><input required name="name" placeholder="Ex.: Educação"></div><div class="field"><label>Tipo</label><select name="type"><option value="expense">Saída</option><option value="entry">Entrada</option></select></div><div class="field"><label>Cor</label><input name="color" type="color" value="#b98252"></div></div><div class="modal-foot"><button type="button" class="btn soft" data-action="close-modal">Cancelar</button><button class="btn primary">Salvar categoria</button></div></form>`)}
    function exportData(){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download=`fluxo-financeiro-${selectedMonth()}.json`;link.click();URL.revokeObjectURL(link.href);toast('Backup exportado.')}
    function importData(file){const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(reader.result);if(!parsed.transactions||!parsed.categories||!parsed.settings)throw new Error();data=parsed;save();render();toast('Backup importado com sucesso.')}catch{toast('Este arquivo não é um backup válido.')}};reader.readAsText(file)}
    document.addEventListener('click',e=>{const a=e.target.closest('[data-action]');if(!a)return;const action=a.dataset.action;if(action==='tab'){state.tab=a.dataset.tab;state.filter='';render()}if(action==='close-modal')closeModal();if(action==='open-transaction')transactionForm(a.dataset.kind);if(action==='edit-transaction'){const tx=data.transactions.find(x=>x.id===a.dataset.id);if(tx)transactionForm(tx.type,tx)}if(action==='toggle-status'){const tx=data.transactions.find(x=>x.id===a.dataset.id);if(tx){tx.status=tx.status==='pending'?(tx.type==='entry'?'received':'paid'):'pending';save();render();toast('Status atualizado.')}}if(action==='delete-transaction'){if(confirm('Excluir este lançamento?')){data.transactions=data.transactions.filter(x=>x.id!==a.dataset.id);save();render();toast('Lançamento excluído.')}}if(action==='open-card')cardForm();if(action==='open-purchase')purchaseForm();if(action==='delete-purchase'){data.purchases=data.purchases.filter(x=>x.id!==a.dataset.id);save();render();toast('Compra excluída.')}if(action==='open-category')categoryForm();if(action==='delete-category'){const id=a.dataset.id;if(data.transactions.some(t=>t.category===id)){toast('Esta categoria possui lançamentos e não pode ser excluída.');return}data.categories=data.categories.filter(c=>c.id!==id);save();render();toast('Categoria excluída.')}if(action==='export')exportData();if(action==='import')$('#importFile').click();if(action==='reset'){if(confirm('Restaurar os dados de demonstração?')){data=structuredClone(sample);save();render();toast('Dados restaurados.')}}});
    document.addEventListener('input',e=>{if(e.target.matches('[data-filter="records"]')){state.filter=e.target.value;const p=e.target.closest('.page');if(p){const active=$('.tab-btn.active')?.textContent;render()}}});
    document.addEventListener('change',e=>{if(e.target.id==='monthSelect'){data.settings.month=e.target.value;save();render()}if(e.target.id==='initialBalance'){data.settings.initialBalance=Number(e.target.value||0);save();render()}if(e.target.id==='importFile'&&e.target.files[0])importData(e.target.files[0])});
    document.addEventListener('submit',e=>{e.preventDefault();const form=e.target;const values=Object.fromEntries(new FormData(form));if(form.id==='transactionForm'){const id=form.dataset.id;const tx={id:id||`t_${Date.now()}`,type:form.dataset.kind,description:values.description.trim(),value:Number(values.value),date:values.date,category:values.category,method:values.method,status:values.status,recurring:values.recurring==='true'};if(id)data.transactions=data.transactions.map(x=>x.id===id?tx:x);else data.transactions.push(tx);save();closeModal();render();toast('Lançamento salvo.')}if(form.id==='cardForm'){data.cards.push({id:`c_${Date.now()}`,name:values.name.trim(),limit:Number(values.limit),dueDay:Number(values.dueDay),color:values.color});save();closeModal();render();toast('Cartão salvo.')}if(form.id==='purchaseForm'){data.purchases.push({id:`p_${Date.now()}`,cardId:values.cardId,description:values.description.trim(),value:Number(values.value),date:values.date,installments:Number(values.installments)});save();closeModal();render();toast('Compra salva.')}if(form.id==='categoryForm'){data.categories.push({id:`cat_${Date.now()}`,name:values.name.trim(),type:values.type,color:values.color});save();closeModal();render();toast('Categoria salva.')}});
    $('#modalShell').addEventListener('click',e=>{if(e.target.id==='modalShell')closeModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});render();
  })();
  </script>
</body>
</html>
